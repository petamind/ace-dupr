<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ace DUPR — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-6 shadow-sm">
    <span class="text-blue-700 font-bold text-lg tracking-tight">🏓 Ace DUPR</span>
    <a href="index.html" class="nav-link active">Dashboard</a>
    <a href="matches.html" class="nav-link">Matches</a>
    <a href="leaderboard.html" class="nav-link">Leaderboard</a>
    <a href="settings.html" class="nav-link">Settings</a>
  </nav>

  <main id="app" class="max-w-5xl mx-auto px-6 py-8">

    <!-- Stats bar -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Club Ratings</h1>
        <p class="text-sm text-gray-500 mt-0.5">
          <span id="stat-players">0</span> active players ·
          <span id="stat-matches">0</span> matches recorded
        </p>
      </div>
      <a href="matches.html" class="btn-primary">+ Add Match</a>
    </div>

    <!-- Ratings table -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
      <table class="data-table w-full">
        <thead>
          <tr>
            <th data-sort="name" class="px-3 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide bg-gray-50 border-b border-gray-200">
              Player
            </th>
            <th data-sort="md" class="px-3 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide bg-gray-50 border-b border-gray-200">
              MD
            </th>
            <th data-sort="wd" class="px-3 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide bg-gray-50 border-b border-gray-200">
              WD
            </th>
            <th data-sort="xd" class="px-3 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide bg-gray-50 border-b border-gray-200">
              XD
            </th>
            <th data-sort="ms" class="px-3 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide bg-gray-50 border-b border-gray-200">
              MS
            </th>
            <th data-sort="ws" class="px-3 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide bg-gray-50 border-b border-gray-200">
              WS
            </th>
          </tr>
        </thead>
        <tbody id="ratings-tbody">
          <tr>
            <td colspan="5" class="px-3 py-8 text-center text-gray-400 text-sm">
              No players yet. <a href="settings.html" class="text-blue-500 hover:underline">Add members</a> to get started.
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Legend -->
    <div class="mt-4 flex flex-wrap gap-4 text-xs text-gray-500">
      <span><span class="text-amber-500 font-bold">~</span> Provisional (fewer than 3 matches in last 90 days)</span>
      <span class="flex items-center gap-1">
        <span class="inline-block w-3 h-3 rounded-sm bg-yellow-50 border border-yellow-200"></span> Top 1 per category
      </span>
      <span class="flex items-center gap-1">
        <span class="inline-block w-3 h-3 rounded-sm bg-gray-50 border border-gray-200"></span> Top 2
      </span>
      <span class="flex items-center gap-1">
        <span class="inline-block w-3 h-3 rounded-sm bg-orange-50 border border-orange-200"></span> Top 3
      </span>
    </div>

  </main>

  <script type="module">
    import { initDashboard } from './js/ui.js';
    initDashboard();
  </script>
</body>
</html>
