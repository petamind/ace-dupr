<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎾</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400\&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <title>ACE Pickleball — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link rel="stylesheet" href="css/app.css">
  <script>
    (function () {
      var s = localStorage.getItem('acedupr:theme') ?? 'light';
      if (s === 'dark' || (s === 'system' && matchMedia('(prefers-color-scheme: dark)').matches))
        document.documentElement.classList.add('dark');
    })();
    function _themeMode() { return localStorage.getItem('acedupr:theme') ?? 'light'; }
    function _themeIcon(m) { return ({light:'☀️',dark:'🌙',system:'💻'})[m] ?? '☀️'; }
    function _applyTheme(m) {
      document.documentElement.classList.toggle('dark', m === 'dark' || (m === 'system' && matchMedia('(prefers-color-scheme: dark)').matches));
      var btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = _themeIcon(m);
    }
    function toggleTheme() {
      var next = ({light:'dark',dark:'system',system:'light'})[_themeMode()] ?? 'dark';
      localStorage.setItem('acedupr:theme', next);
      _applyTheme(next);
    }
    addEventListener('DOMContentLoaded', function() { _applyTheme(_themeMode()); });
    matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
      if (_themeMode() === 'system') _applyTheme('system');
    });
  </script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

  <nav class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-6xl mx-auto px-6 py-3 flex items-center gap-6">
      <span class="text-blue-700 font-bold text-base tracking-tight">🏸 ACE Pickleball</span>
      <a href="index.html" class="nav-link active">Dashboard</a>
      <a href="matches.html" class="nav-link">Matches</a>
      <a href="leaderboard.html" class="nav-link">Leaderboard</a>
      <a href="about.html" class="nav-link">About</a>
      <button id="theme-toggle" onclick="toggleTheme()" class="ml-auto p-1.5 rounded-lg text-gray-500 hover:bg-gray-100 transition-colors text-base leading-none" title="Cycle theme: light / dark / system">☀️</button>
    </div>
  </nav>

  <main id="app" class="max-w-6xl mx-auto px-6 py-8">

    <!-- Stats bar -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Club Ratings</h1>
        <p class="text-sm text-gray-500 mt-0.5">
          <span id="stat-players">0</span> active players ·
          <span id="stat-matches">0</span> matches recorded
        </p>
        <p id="data-mode-banner" class="text-xs mt-0.5"></p>
      </div>
      <a href="about.html" class="btn-secondary text-xs">How ratings work →</a>
    </div>

    <!-- Most improved -->
    <div id="improvement-section" class="mb-6"></div>

    <!-- Player of the Week -->
    <div id="week-section" class="mb-6"></div>

    <!-- Player of the Month -->
    <div id="month-section" class="mb-6"></div>

    <!-- Best pairs -->
    <div id="best-pairs-section" class="mb-6"></div>

    <!-- Ratings table -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
      <table class="data-table w-full">
        <thead>
          <tr>
            <th data-sort="name" class="px-3 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide bg-gray-50 border-b border-gray-200">Player</th>
            <th data-sort="md"   class="px-3 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide bg-gray-50 border-b border-gray-200">MD</th>
            <th data-sort="wd"   class="px-3 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide bg-gray-50 border-b border-gray-200">WD</th>
            <th data-sort="xd"   class="px-3 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide bg-gray-50 border-b border-gray-200">XD</th>
            <th data-sort="ms"   class="px-3 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide bg-gray-50 border-b border-gray-200">MS</th>
            <th data-sort="ws"   class="px-3 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide bg-gray-50 border-b border-gray-200">WS</th>
          </tr>
        </thead>
        <tbody id="ratings-tbody">
          <tr>
            <td colspan="6" class="px-3 py-8 text-center text-gray-400 text-sm">
              No data yet.
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Legend -->
    <div class="mt-4 flex flex-wrap gap-4 text-xs text-gray-500">
      <span><span class="text-amber-500 font-bold">~</span> Provisional (fewer than 3 matches in last 90 days)</span>
      <span class="flex items-center gap-1">
        <span class="inline-block w-3 h-3 rounded-sm bg-yellow-50 border border-yellow-200"></span> Top 1 per category
      </span>
      <span class="flex items-center gap-1">
        <span class="inline-block w-3 h-3 rounded-sm bg-gray-50 border border-gray-200"></span> Top 2
      </span>
      <span class="flex items-center gap-1">
        <span class="inline-block w-3 h-3 rounded-sm bg-orange-50 border border-orange-200"></span> Top 3
      </span>
    </div>

  </main>

  <script type="module">
    import { initDashboard } from './js/ui.js';
    initDashboard();
  </script>

  <footer class="border-t border-gray-200 mt-12 py-5">
    <div class="max-w-6xl mx-auto px-6 flex flex-wrap items-center justify-between gap-2 text-xs text-gray-400">
      <span>© <span id="footer-year"></span> ACE Pickleball Club · Website by <a href="https://petaminds.com" target="_blank" rel="noopener" class="hover:text-blue-500 transition-colors">Tùng Nguyễn</a></span>
      <span id="version-info" class="font-mono tabular-nums"></span>
    </div>
  </footer>
  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();
    fetch('version.json').then(function(r){ return r.json(); }).then(function(v){
      var el = document.getElementById('version-info');
      if (el) el.textContent = 'v' + v.version + (v.algorithm ? ' · Algorithm ' + v.algorithm : '');
    }).catch(function(){});
  </script>
</body>
</html>
